name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Check formatting
        run: composer format:test

      - name: Static analysis
        run: composer analyse

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '^10.48.29'
            illuminate: '^10.0'
            testbench: '^8.37'
          - php: '8.2'
            laravel: '^11.0'
            illuminate: '^11.0'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '^12.0.1'
            illuminate: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            illuminate: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^13.0'
            illuminate: '^13.0'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.illuminate }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: Set dependency constraints
        run: |
          composer require "illuminate/support:${{ matrix.illuminate }}" --no-update --no-interaction
          composer require --dev "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --with-all-dependencies --prefer-dist --no-interaction

      - name: Run tests
        run: composer test
